name: Render AltVeda Video

on:
  repository_dispatch:
    types: [render_video]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Render Video
        # Use the official Remotion action to handle Chrome/Dependencies
        uses: remotion-dev/github-action@v1
        with:
          entry-point: src/index.ts
          composition-id: ${{ github.event.client_payload.compositionId }}
          output-location: out/video.mp4
          props: ${{ github.event.client_payload.inputProps }}
        env:
          GOOGLE_TTS_API_KEY: ${{ secrets.GOOGLE_TTS_API_KEY }}

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          # Enforce structural coherence: factory-renders/ prefix
          aws s3 cp out/video.mp4 s3://${{ secrets.R2_BUCKET }}/factory-renders/${{ github.event.client_payload.jobId }}.mp4 \
            --endpoint-url ${{ secrets.R2_ENDPOINT_URL }}
